<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandas Notes for ML</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script>
// Load docx library dynamically
function loadDocxLibrary() {
  return new Promise((resolve, reject) => {
    if (window.docx) { resolve(window.docx); return; }
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/docx@8.5.0/build/index.umd.js';
    script.onload = () => resolve(window.docx);
    script.onerror = () => reject(new Error('Failed to load docx library'));
    document.head.appendChild(script);
  });
}
</script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #30363d;
    --accent: #f7b731;
    --accent2: #ff6b6b;
    --accent3: #48dbfb;
    --accent4: #1dd1a1;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --code-bg: #0d1117;
    --code-border: #21262d;
    --tag-bg: #21262d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo-area h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent) 0%, #f0932b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-area p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-save {
    background: linear-gradient(135deg, var(--accent) 0%, #f0932b 100%);
    color: #0d1117;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(247, 183, 49, 0.3);
  }

  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(247, 183, 49, 0.5);
  }

  .btn-save:active { transform: translateY(0); }

  .save-icon { font-size: 16px; }

  /* PROGRESS BAR */
  .progress-bar {
    height: 3px;
    background: var(--border);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.1s;
  }

  /* SIDEBAR NAV */
  .layout {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 0;
    min-height: calc(100vh - 120px);
  }

  .sidebar {
    position: sticky;
    top: 120px;
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding: 24px 0;
    border-right: 1px solid var(--border);
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 20px 12px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    font-size: 13px;
    color: var(--text-muted);
  }

  .nav-item:hover {
    background: var(--surface);
    color: var(--text);
    border-left-color: var(--accent);
  }

  .nav-item.active {
    background: var(--surface);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 600;
  }

  .nav-num {
    background: var(--tag-bg);
    color: var(--text-muted);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 24px;
    text-align: center;
  }

  .nav-item.active .nav-num {
    background: rgba(247, 183, 49, 0.15);
    color: var(--accent);
  }

  /* MAIN CONTENT */
  .main {
    padding: 40px 48px;
    overflow-y: auto;
  }

  /* TOPIC CARD */
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 48px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .topic-card:hover { border-color: rgba(247, 183, 49, 0.3); }

  .topic-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 28px 32px 20px;
    background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
    border-bottom: 1px solid var(--border);
  }

  .topic-num {
    background: linear-gradient(135deg, var(--accent) 0%, #f0932b 100%);
    color: #0d1117;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .topic-title-area h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .topic-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .topic-body {
    padding: 28px 32px;
  }

  /* WHAT IS */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .what-is {
    font-size: 15px;
    line-height: 1.75;
    color: #c9d1d9;
    margin-bottom: 24px;
    padding: 16px 20px;
    background: rgba(248, 184, 50, 0.05);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
  }

  /* METHODS */
  .methods-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .method-tag {
    background: var(--tag-bg);
    border: 1px solid var(--code-border);
    color: var(--accent3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .method-tag:hover {
    border-color: var(--accent3);
    background: rgba(72, 219, 251, 0.08);
  }

  /* CODE BLOCK */
  .code-wrapper {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #161b22;
    border-bottom: 1px solid var(--code-border);
  }

  .code-dots {
    display: flex;
    gap: 6px;
  }

  .code-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .code-dot:nth-child(1) { background: #ff5f57; }
  .code-dot:nth-child(2) { background: #ffbd2e; }
  .code-dot:nth-child(3) { background: #28ca41; }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  pre {
    padding: 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #e6edf3;
  }

  pre::-webkit-scrollbar { height: 4px; }
  pre::-webkit-scrollbar-thumb { background: var(--border); }

  .kw { color: #ff79c6; }
  .fn { color: #50fa7b; }
  .st { color: #f1fa8c; }
  .cm { color: #6272a4; font-style: italic; }
  .nm { color: #bd93f9; }
  .op { color: #ff5555; }
  .out { color: #8be9fd; }
  .df { color: #ffb86c; }

  /* OUTPUT */
  .output-block {
    background: #0a0e14;
    border: 1px solid #1e2a3a;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }

  .output-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent4);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .output-block pre {
    padding: 0;
    font-size: 12.5px;
    color: #8be9fd;
    white-space: pre;
  }

  /* ML USE */
  .ml-use {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    background: linear-gradient(135deg, rgba(29, 209, 161, 0.08) 0%, rgba(29, 209, 161, 0.03) 100%);
    border: 1px solid rgba(29, 209, 161, 0.2);
    border-radius: 10px;
    padding: 16px 20px;
  }

  .ml-icon { font-size: 20px; flex-shrink: 0; }

  .ml-use-content strong {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent4);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .ml-use-content p {
    font-size: 14px;
    color: #a8d8c8;
    line-height: 1.6;
  }

  /* SUMMARY TABLE */
  .summary-section {
    background: var(--surface);
    border: 1px solid rgba(247, 183, 49, 0.3);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .summary-header {
    background: linear-gradient(135deg, rgba(247, 183, 49, 0.15) 0%, rgba(240, 147, 43, 0.1) 100%);
    padding: 24px 32px;
    border-bottom: 1px solid rgba(247, 183, 49, 0.2);
  }

  .summary-header h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .summary-table {
    width: 100%;
    border-collapse: collapse;
  }

  .summary-table th {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 20px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .summary-table td {
    padding: 14px 20px;
    font-size: 13.5px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .summary-table tr:last-child td { border-bottom: none; }

  .summary-table tr:hover td { background: rgba(255,255,255,0.02); }

  .summary-table td:first-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    width: 40px;
  }

  .summary-table td:nth-child(2) {
    font-weight: 600;
    color: var(--text);
    width: 200px;
  }

  .summary-table td:nth-child(3) {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--accent3);
    width: 220px;
  }

  .summary-table td:nth-child(4) {
    color: #a8d8c8;
    font-size: 13px;
    line-height: 1.5;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(247,183,49,0.2);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* SCROLL */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 24px 20px; }
    header { padding: 20px; }
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>🐼 Pandas Notes for ML</h1>
      <p>Top 20 Topics — Full Explanation with Code & Output</p>
    </div>
    <div class="header-actions">
      <button class="btn-save" onclick="saveAsDocx()">
        <span class="save-icon">💾</span>
        Save as .docx
      </button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Topics</div>
    <div id="navList"></div>
  </nav>

  <main class="main" id="mainContent">
    <div id="topicsContainer"></div>
    <div class="summary-section" id="summarySection">
      <div class="summary-header">
        <h2>📋 Complete Summary — All 20 Topics</h2>
      </div>
      <table class="summary-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Topic</th>
            <th>Key Methods</th>
            <th>ML Use</th>
          </tr>
        </thead>
        <tbody id="summaryBody"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast">✅ pandas_notes.docx saved!</div>

<script>
const topics = [
  {
    num: 1,
    title: "Series Creation",
    subtitle: "1D labeled array — Pandas-এর মূল building block",
    methods: ["pd.Series()", "pd.Series(data, index=)", ".name", ".dtype", ".values", ".index"],
    what: "Series হলো Pandas-এর একটি one-dimensional labeled array। এটে যেকোনো ধরনের data রাখা যায় — integer, float, string, object। প্রতিটি element-এর সাথে একটি label (index) থাকে। NumPy array-এর মতো, কিন্তু custom index-এর সুবিধাসহ।",
    code: `<span class="kw">import</span> pandas <span class="kw">as</span> pd
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># List থেকে Series</span>
s1 = pd.<span class="fn">Series</span>([<span class="nm">10</span>, <span class="nm">20</span>, <span class="nm">30</span>, <span class="nm">40</span>, <span class="nm">50</span>])
<span class="fn">print</span>(s1)

<span class="cm"># Custom index দিয়ে</span>
s2 = pd.<span class="fn">Series</span>([<span class="nm">85</span>, <span class="nm">92</span>, <span class="nm">78</span>, <span class="nm">96</span>],
            index=[<span class="st">'Math'</span>, <span class="st">'Science'</span>, <span class="st">'English'</span>, <span class="st">'History'</span>])
<span class="fn">print</span>(s2)

<span class="cm"># Dictionary থেকে</span>
data = {<span class="st">'age'</span>: <span class="nm">25</span>, <span class="st">'salary'</span>: <span class="nm">50000</span>, <span class="st">'score'</span>: <span class="nm">9.5</span>}
s3 = pd.<span class="fn">Series</span>(data)
<span class="fn">print</span>(s3)

<span class="cm"># Properties</span>
<span class="fn">print</span>(<span class="st">"Shape:"</span>, s2.shape)
<span class="fn">print</span>(<span class="st">"Dtype:"</span>, s2.dtype)
<span class="fn">print</span>(<span class="st">"Index:"</span>, s2.index.<span class="fn">tolist</span>())`,
    output: `0    10
1    20
2    30
3    40
4    50
dtype: int64

Math       85
Science    92
English    78
History    96
dtype: int64

age        25.0
salary    50000.0
score         9.5
dtype: float64

Shape: (4,)
Dtype: int64
Index: ['Math', 'Science', 'English', 'History']`,
    ml: "Feature vector তৈরিতে, model output (predictions) store করতে, এবং single column statistics বের করতে Series ব্যবহার হয়। যেমন: y_pred = pd.Series(model.predict(X_test), index=test_idx)"
  },
  {
    num: 2,
    title: "DataFrame Creation",
    subtitle: "2D labeled table — ML Dataset-এর মূল structure",
    methods: ["pd.DataFrame()", "pd.DataFrame(dict)", ".shape", ".columns", ".dtypes", ".info()", ".head()", ".tail()"],
    what: "DataFrame হলো Pandas-এর সবচেয়ে গুরুত্বপূর্ণ structure। এটি rows ও columns সহ একটি 2-dimensional table। প্রতিটি column একটি Series। ML-এ dataset সবসময় DataFrame হিসেবে handle করা হয়।",
    code: `<span class="kw">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># Dictionary থেকে DataFrame</span>
data = {
    <span class="st">'Name'</span>: [<span class="st">'Alice'</span>, <span class="st">'Bob'</span>, <span class="st">'Charlie'</span>, <span class="st">'David'</span>],
    <span class="st">'Age'</span>: [<span class="nm">25</span>, <span class="nm">30</span>, <span class="nm">35</span>, <span class="nm">28</span>],
    <span class="st">'Salary'</span>: [<span class="nm">50000</span>, <span class="nm">70000</span>, <span class="nm">90000</span>, <span class="nm">60000</span>],
    <span class="st">'Dept'</span>: [<span class="st">'IT'</span>, <span class="st">'HR'</span>, <span class="st">'IT'</span>, <span class="st">'Finance'</span>]
}
df = pd.<span class="fn">DataFrame</span>(data)
<span class="fn">print</span>(df)
<span class="fn">print</span>(<span class="st">"\nShape:"</span>, df.shape)
<span class="fn">print</span>(<span class="st">"Columns:"</span>, df.columns.<span class="fn">tolist</span>())
<span class="fn">print</span>(<span class="st">"\nDataTypes:\n"</span>, df.dtypes)
<span class="fn">print</span>(<span class="st">"\nInfo:"</span>)
df.<span class="fn">info</span>()`,
    output: `      Name  Age  Salary     Dept
0    Alice   25   50000       IT
1      Bob   30   70000       HR
2  Charlie   35   90000       IT
3    David   28   60000  Finance

Shape: (4, 4)
Columns: ['Name', 'Age', 'Salary', 'Dept']

DataTypes:
 Name      object
Age        int64
Salary     int64
Dept      object
dtype: object

Info:
<class 'pandas.core.frame.DataFrame'>
RangeIndex: 4 entries, 0 to 3
Data columns (total 4 columns):
 #   Column  Non-Null Count  Dtype
---  ------  --------------  -----
 0   Name    4 non-null      object
 1   Age     4 non-null      int64
 2   Salary  4 non-null      int64
 3   Dept    4 non-null      object`,
    ml: "ML-এ সম্পূর্ণ training dataset DataFrame হিসেবে থাকে। df[features] দিয়ে X, df[target] দিয়ে y আলাদা করা হয়। .info() দিয়ে missing data ও dtypes একসাথে দেখা যায়।"
  },
  {
    num: 3,
    title: "Reading Data",
    subtitle: "External files থেকে data load করা",
    methods: ["pd.read_csv()", "pd.read_excel()", "pd.read_json()", "pd.read_sql()", "pd.read_parquet()", "pd.read_html()"],
    what: "Real-world ML project-এ data সবসময় বাইরের file বা database থেকে আসে। Pandas বিভিন্ন format সমর্থন করে — CSV, Excel, JSON, SQL, Parquet ইত্যাদি। read_csv() সবচেয়ে বেশি ব্যবহৃত কারণ Kaggle সহ বেশিরভাগ dataset CSV format-এ থাকে।",
    code: `<span class="kw">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># Basic CSV read</span>
df = pd.<span class="fn">read_csv</span>(<span class="st">'data.csv'</span>)

<span class="cm"># Advanced options</span>
df = pd.<span class="fn">read_csv</span>(
    <span class="st">'data.csv'</span>,
    sep=<span class="st">','</span>,           <span class="cm"># Separator</span>
    header=<span class="nm">0</span>,          <span class="cm"># Row number for column names</span>

        shading: { fill: BLUE, type: ShadingType.CLEAR },
        spacing: { before: 0, after: 200 },
        children: [new TextRun({ text: "Top 20 Topics — Full Explanation with Code & Output", font: "Arial", size: 22, italic: true, color: "FFFFFF" })]
      }),
      sp(200)
    );

    // Topics
    for (const t of topics) {
      // Header
      children.push(
        new Paragraph({
          shading: { fill: DARK, type: ShadingType.CLEAR },
          spacing: { before: 240, after: 0 },
          children: [new TextRun({ text: `  ${String(t.num).padStart(2,'0')}. ${t.title}`, font: "Arial", size: 28, bold: true, color: "FFFFFF" })]
        }),
        new Paragraph({
          shading: { fill: "1A237E", type: ShadingType.CLEAR },
          spacing: { before: 0, after: 100 },
          children: [new TextRun({ text: `  ${t.subtitle}`, font: "Arial", size: 18, italic: true, color: "BBDEFB" })]
        })
      );

      // What is
      children.push(
        new Paragraph({
          spacing: { before: 80, after: 40 },
          children: [new TextRun({ text: "📌 What Is It", font: "Arial", size: 20, bold: true, color: BLUE })]
        }),
        new Paragraph({
          spacing: { before: 0, after: 80 },
          border: { left: { style: BorderStyle.SINGLE, size: 8, color: "F7B731", space: 6 } },
          children: [new TextRun({ text: "  " + t.what, font: "Arial", size: 19, color: "333333" })]
        })
      );

      // Methods
      children.push(
        new Paragraph({
          spacing: { before: 40, after: 40 },
          children: [
            new TextRun({ text: "🔧 Key Methods: ", font: "Arial", size: 19, bold: true, color: BLUE }),
            new TextRun({ text: t.methods.join("  |  "), font: "Courier New", size: 17, color: "455A64" })
          ]
        })
      );

      // Code block
      children.push(
        new Paragraph({
          spacing: { before: 60, after: 40 },
          children: [new TextRun({ text: "💻 Code Example", font: "Arial", size: 19, bold: true, color: BLUE })]
        })
      );

      // Strip HTML tags from code
      const rawCode = t.code.replace(/<[^>]+>/g, '');
      const codeLines = rawCode.split('\n');

      children.push(
        new Table({
          width: { size: 9360, type: WidthType.DXA },
          columnWidths: [9360],
          rows: [new TableRow({
            children: [new TableCell({
              borders: { top: { style: BorderStyle.SINGLE, size: 4, color: "455A64" }, bottom: { style: BorderStyle.SINGLE, size: 4, color: "455A64" }, left: { style: BorderStyle.SINGLE, size: 12, color: BLUE }, right: { style: BorderStyle.SINGLE, size: 4, color: "455A64" } },
              shading: { fill: "1A2233", type: ShadingType.CLEAR },
              margins: { top: 80, bottom: 80, left: 140, right: 140 },
              children: codeLines.map(line => new Paragraph({
                spacing: { before: 20, after: 20 },
                children: [new TextRun({ text: line || ' ', font: "Courier New", size: 17, color: "A8D8C8" })]
              }))
            })]
          })]
        })
      );

      // Output
      children.push(
        sp(60),
        new Paragraph({
          spacing: { before: 0, after: 30 },
          children: [new TextRun({ text: "▶ OUTPUT", font: "Courier New", size: 16, bold: true, color: "1DD1A1" })]
        })
      );

      const outLines = t.output.split('\n');
      children.push(
        new Table({
          width: { size: 9360, type: WidthType.DXA },
          columnWidths: [9360],
          rows: [new TableRow({
            children: [new TableCell({
              borders: { top: { style: BorderStyle.SINGLE, size: 2, color: "1E2A3A" }, bottom: { style: BorderStyle.SINGLE, size: 2, color: "1E2A3A" }, left: { style: BorderStyle.SINGLE, size: 6, color: "1DD1A1" }, right: { style: BorderStyle.SINGLE, size: 2, color: "1E2A3A" } },
              shading: { fill: "0A0E14", type: ShadingType.CLEAR },
              margins: { top: 60, bottom: 60, left: 120, right: 120 },
              children: outLines.map(line => new Paragraph({
                spacing: { before: 16, after: 16 },
                children: [new TextRun({ text: line || ' ', font: "Courier New", size: 16, color: "8BE9FD" })]
              }))
            })]
          })]
        })
      );

      // ML Use
      children.push(
        sp(60),
        new Table({
          width: { size: 9360, type: WidthType.DXA },
          columnWidths: [9360],
          rows: [new TableRow({
            children: [new TableCell({
              borders,
              shading: { fill: "E8F5E9", type: ShadingType.CLEAR },
              margins: { top: 80, bottom: 80, left: 140, right: 140 },
              children: [new Paragraph({
                spacing: { before: 0, after: 0 },
                children: [
                  new TextRun({ text: "🤖 ML Use: ", font: "Arial", size: 18, bold: true, color: GREEN }),
                  new TextRun({ text: t.ml, font: "Arial", size: 18, color: "1B5E20" })
                ]
              })]
            })]
          })]
        }),
        sp(160)
      );
    }

    // Summary Table
    children.push(
      new Paragraph({
        shading: { fill: DARK, type: ShadingType.CLEAR },
        spacing: { before: 200, after: 0 },
        children: [new TextRun({ text: "  📋 Quick Reference Summary — All 20 Topics", font: "Arial", size: 26, bold: true, color: "FFFFFF" })]
      }),
      sp(80)
    );

    const summaryRows = [
      new TableRow({
        children: [
          new TableCell({ borders, shading: { fill: BLUE, type: ShadingType.CLEAR }, width: { size: 500, type: WidthType.DXA }, margins: { top: 80, bottom: 80, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: "#", font: "Arial", size: 17, bold: true, color: "FFFFFF" })] })] }),
          new TableCell({ borders, shading: { fill: BLUE, type: ShadingType.CLEAR }, width: { size: 2000, type: WidthType.DXA }, margins: { top: 80, bottom: 80, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: "Topic", font: "Arial", size: 17, bold: true, color: "FFFFFF" })] })] }),
          new TableCell({ borders, shading: { fill: BLUE, type: ShadingType.CLEAR }, width: { size: 2300, type: WidthType.DXA }, margins: { top: 80, bottom: 80, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: "Key Methods", font: "Arial", size: 17, bold: true, color: "FFFFFF" })] })] }),
          new TableCell({ borders, shading: { fill: BLUE, type: ShadingType.CLEAR }, width: { size: 4560, type: WidthType.DXA }, margins: { top: 80, bottom: 80, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: "ML Application", font: "Arial", size: 17, bold: true, color: "FFFFFF" })] })] }),
        ]
      }),
      ...topics.map((t, i) => new TableRow({
        children: [
          new TableCell({ borders, shading: { fill: i % 2 === 0 ? "FFFFFF" : "E3F2FD", type: ShadingType.CLEAR }, width: { size: 500, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: String(t.num), font: "Arial", size: 16, bold: true, color: BLUE })] })] }),
          new TableCell({ borders, shading: { fill: i % 2 === 0 ? "FFFFFF" : "E3F2FD", type: ShadingType.CLEAR }, width: { size: 2000, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: t.title, font: "Arial", size: 16, bold: true, color: "222222" })] })] }),
          new TableCell({ borders, shading: { fill: i % 2 === 0 ? "FFFFFF" : "E3F2FD", type: ShadingType.CLEAR }, width: { size: 2300, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: t.methods.slice(0,3).join(', '), font: "Courier New", size: 15, color: "1565C0" })] })] }),
          new TableCell({ borders, shading: { fill: i % 2 === 0 ? "FFFFFF" : "E3F2FD", type: ShadingType.CLEAR }, width: { size: 4560, type: WidthType.DXA }, margins: { top: 60, bottom: 60, left: 100, right: 100 }, children: [new Paragraph({ children: [new TextRun({ text: t.ml.substring(0, 120), font: "Arial", size: 15, color: "333333" })] })] }),
        ]
      }))
    ];

    children.push(new Table({
      width: { size: 9360, type: WidthType.DXA },
      columnWidths: [500, 2000, 2300, 4560],
      rows: summaryRows
    }));

    const doc = new Document({
      styles: {
        default: { document: { run: { font: "Arial", size: 20 } } },
        paragraphStyles: [
          { id: "Heading1", name: "Heading 1", basedOn: "Normal", next: "Normal", quickFormat: true,
            run: { size: 32, bold: true, font: "Arial", color: DARK },
            paragraph: { spacing: { before: 240, after: 160 }, outlineLevel: 0 } }
        ]
      },
      sections: [{
        properties: {
          page: {
            size: { width: 12240, height: 15840 },
            margin: { top: 1000, right: 1000, bottom: 1000, left: 1000 }
          }
        },
        children
      }]
    });

    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pandas_notes_ml.docx';
    a.click();
    URL.revokeObjectURL(url);

    const toast = document.getElementById('toast');
    toast.textContent = '✅ pandas_notes_ml.docx saved!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);

  } catch (err) {
    console.error(err);
    alert('Error: ' + err.message);
  } finally {
    btn.innerHTML = '<span class="save-icon">💾</span> Save as .docx';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
