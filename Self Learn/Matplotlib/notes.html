<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matplotlib Notes for ML</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0f1e;
        --surface: #111827;
        --surface2: #1a2235;
        --surface3: #1e2d40;
        --border: #1f2d3d;
        --border2: #2a3a50;
        --accent: #38bdf8;
        --accent2: #fb923c;
        --accent3: #a78bfa;
        --accent4: #34d399;
        --accent5: #f472b6;
        --text: #e2e8f0;
        --text-muted: #64748b;
        --text-dim: #94a3b8;
        --code-bg: #050810;
        --yellow: #fbbf24;
        --red: #f87171;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 16px;
        line-height: 1.7;
      }

      /* ── TOPBAR ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 200;
        background: rgba(10, 15, 30, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border2);
        padding: 0 40px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-brand .logo {
        font-size: 24px;
      }
      .topbar-brand h1 {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.3px;
        background: linear-gradient(
          90deg,
          var(--accent) 0%,
          var(--accent3) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .topbar-brand p {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 1px;
      }
      .topbar-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .badge {
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--text-dim);
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 20px;
      }

      .btn-save {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent3) 100%
        );
        color: #0a0f1e;
        border: none;
        padding: 10px 22px;
        border-radius: 10px;
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        box-shadow: 0 0 24px rgba(56, 189, 248, 0.25);
      }
      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 36px rgba(56, 189, 248, 0.45);
      }
      .btn-save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      /* ── PROGRESS ── */
      .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        z-index: 999;
        background: transparent;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--accent),
          var(--accent3),
          var(--accent5)
        );
        width: 0%;
        transition: width 0.1s;
      }

      /* ── LAYOUT ── */
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        max-width: 1400px;
        margin: 0 auto;
        min-height: calc(100vh - 64px);
      }

      /* ── SIDEBAR ── */
      .sidebar {
        position: sticky;
        top: 64px;
        height: calc(100vh - 64px);
        overflow-y: auto;
        border-right: 1px solid var(--border2);
        padding: 20px 0;
        background: var(--surface);
      }
      .sidebar::-webkit-scrollbar {
        width: 3px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }

      .sidebar-group-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 12px 20px 6px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 20px;
        cursor: pointer;
        border-left: 3px solid transparent;
        font-size: 13.5px;
        color: var(--text-dim);
        transition: all 0.15s;
      }
      .nav-item:hover {
        background: var(--surface2);
        color: var(--text);
        border-left-color: var(--accent);
      }
      .nav-item.active {
        background: rgba(56, 189, 248, 0.07);
        color: var(--accent);
        border-left-color: var(--accent);
        font-weight: 600;
      }
      .nav-num {
        min-width: 26px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface2);
        border-radius: 4px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--text-muted);
        font-weight: 700;
      }
      .nav-item.active .nav-num {
        background: rgba(56, 189, 248, 0.15);
        color: var(--accent);
      }

      /* ── MAIN ── */
      .main {
        padding: 44px 52px;
        overflow-x: hidden;
      }

      /* ── TOPIC CARD ── */
      .topic-card {
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 20px;
        margin-bottom: 60px;
        overflow: hidden;
      }
      .topic-card:hover {
        border-color: rgba(56, 189, 248, 0.25);
      }

      .topic-header {
        padding: 30px 36px 24px;
        background: linear-gradient(
          135deg,
          var(--surface2) 0%,
          var(--surface) 100%
        );
        border-bottom: 1px solid var(--border2);
        display: flex;
        align-items: flex-start;
        gap: 18px;
      }
      .topic-badge {
        background: linear-gradient(135deg, var(--accent), var(--accent3));
        color: #0a0f1e;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        padding: 5px 12px;
        border-radius: 8px;
        flex-shrink: 0;
        margin-top: 4px;
      }
      .topic-title h2 {
        font-size: 24px;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 5px;
        letter-spacing: -0.3px;
      }
      .topic-subtitle {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 400;
      }
      .ml-badge {
        margin-left: auto;
        flex-shrink: 0;
        background: rgba(52, 211, 153, 0.1);
        border: 1px solid rgba(52, 211, 153, 0.3);
        color: var(--accent4);
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        letter-spacing: 0.5px;
        white-space: nowrap;
        margin-top: 4px;
      }

      .topic-body {
        padding: 32px 36px;
      }

      /* ── SECTION LABELS ── */
      .sec-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sec-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border2);
      }

      /* ── WHAT IS ── */
      .what-is {
        font-size: 15.5px;
        line-height: 1.85;
        color: var(--text-dim);
        padding: 18px 22px;
        background: rgba(56, 189, 248, 0.04);
        border-left: 3px solid var(--accent);
        border-radius: 0 10px 10px 0;
        margin-bottom: 28px;
      }

      /* ── METHODS ── */
      .methods-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 28px;
      }
      .mtag {
        font-family: "JetBrains Mono", monospace;
        font-size: 12.5px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--accent3);
        padding: 5px 12px;
        border-radius: 6px;
        transition: all 0.15s;
      }
      .mtag:hover {
        border-color: var(--accent3);
        background: rgba(167, 139, 250, 0.08);
      }

      /* ── EXAMPLE BLOCK ── */
      .example-block {
        margin-bottom: 32px;
      }
      .example-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent2);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.3px;
      }
      .example-title::before {
        content: "◆";
        font-size: 9px;
      }

      /* ── CODE ── */
      .code-wrap {
        background: var(--code-bg);
        border: 1px solid var(--border2);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .code-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 16px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border2);
      }
      .code-dots {
        display: flex;
        gap: 5px;
      }
      .code-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .code-dot:nth-child(1) {
        background: #ff5f57;
      }
      .code-dot:nth-child(2) {
        background: #ffbd2e;
      }
      .code-dot:nth-child(3) {
        background: #28ca41;
      }
      .code-lang {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text-muted);
      }

      pre {
        padding: 20px 22px;
        overflow-x: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 13.5px;
        line-height: 1.75;
        color: var(--text);
      }
      pre::-webkit-scrollbar {
        height: 4px;
      }
      pre::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      /* syntax */
      .kw {
        color: #c792ea;
      }
      .fn {
        color: #82aaff;
      }
      .st {
        color: #c3e88d;
      }
      .cm {
        color: #546e7a;
        font-style: italic;
      }
      .nm {
        color: #f78c6c;
      }
      .op {
        color: #89ddff;
      }
      .df {
        color: #ffcb6b;
      }
      .bi {
        color: #80cbc4;
      }
      .dec {
        color: #ff5370;
      }
      .at {
        color: #f07178;
      }

      /* ── OUTPUT ── */
      .out-wrap {
        background: #030508;
        border: 1px solid #0d1829;
        border-left: 3px solid var(--accent4);
        border-radius: 0 10px 10px 0;
        padding: 14px 18px;
        margin-bottom: 20px;
      }
      .out-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 700;
        color: var(--accent4);
        letter-spacing: 1.5px;
        margin-bottom: 8px;
      }
      .out-wrap pre {
        padding: 0;
        font-size: 13px;
        color: #67e8f9;
      }

      /* ── ML USE ── */
      .ml-use-box {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: linear-gradient(
          135deg,
          rgba(52, 211, 153, 0.07),
          rgba(52, 211, 153, 0.03)
        );
        border: 1px solid rgba(52, 211, 153, 0.2);
        border-radius: 12px;
        padding: 18px 22px;
        margin-top: 8px;
      }
      .ml-icon {
        font-size: 22px;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .ml-content strong {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent4);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .ml-content p {
        font-size: 14.5px;
        color: #86efac;
        line-height: 1.7;
      }

      /* ── SUMMARY ── */
      .summary-card {
        background: var(--surface);
        border: 1px solid rgba(167, 139, 250, 0.3);
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 40px;
      }
      .summary-head {
        background: linear-gradient(
          135deg,
          rgba(167, 139, 250, 0.12),
          rgba(56, 189, 248, 0.08)
        );
        padding: 26px 36px;
        border-bottom: 1px solid rgba(167, 139, 250, 0.2);
      }
      .summary-head h2 {
        font-size: 22px;
        font-weight: 800;
        color: var(--accent3);
      }
      .sum-table {
        width: 100%;
        border-collapse: collapse;
      }
      .sum-table th {
        background: var(--surface2);
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 14px 20px;
        text-align: left;
        border-bottom: 1px solid var(--border2);
      }
      .sum-table td {
        padding: 13px 20px;
        font-size: 14px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      .sum-table tr:last-child td {
        border-bottom: none;
      }
      .sum-table tr:hover td {
        background: rgba(255, 255, 255, 0.015);
      }
      .sum-table td:first-child {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent3);
        width: 36px;
      }
      .sum-table td:nth-child(2) {
        font-weight: 700;
        color: var(--text);
        width: 200px;
      }
      .sum-table td:nth-child(3) {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--accent);
        width: 220px;
      }
      .sum-table td:nth-child(4) {
        color: var(--text-dim);
        font-size: 13.5px;
        line-height: 1.5;
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: var(--surface);
        border: 1px solid var(--accent4);
        border-radius: 12px;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 700;
        color: var(--accent4);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          0 0 20px rgba(52, 211, 153, 0.15);
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 999;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .main {
          padding: 24px 18px;
        }
        .topbar {
          padding: 0 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>

    <header class="topbar">
      <div class="topbar-brand">
        <span class="logo">📊</span>
        <div>
          <h1>Matplotlib Notes for ML</h1>
          <p>Top 20 Topics — Full Examples with Output</p>
        </div>
      </div>
      <div class="topbar-right">
        <span class="badge">20 Topics</span>
        <button class="btn-save" onclick="saveAsDocx()">
          💾 Save as .docx
        </button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar">
        <div class="sidebar-group-label">Topics</div>
        <div id="navList"></div>
      </nav>
      <main class="main">
        <div id="topicsContainer"></div>
        <div class="summary-card" id="summaryCard">
          <div class="summary-head">
            <h2>📋 Complete Summary — All 20 Topics</h2>
          </div>
          <table class="sum-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Topic</th>
                <th>Key Functions</th>
                <th>ML Use</th>
              </tr>
            </thead>
            <tbody id="sumBody"></tbody>
          </table>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">✅ matplotlib_notes.docx saved!</div>

    <script>
      const TOPICS = [
        {
          num: 1,
          title: "Basic Plot Setup",
          subtitle: "Figure, Axes তৈরি এবং plt.show() — সব কিছুর শুরু",
          mlBadge: "★ Most Used",
          methods: [
            "plt.figure()",
            "plt.subplots()",
            "fig.set_size_inches()",
            "plt.show()",
            "plt.savefig()",
            "plt.style.use()",
            "plt.close()",
          ],
          what: "Matplotlib-এ সব কিছু Figure দিয়ে শুরু। Figure হলো canvas — যেখানে সব plot আঁকা হয়। Axes হলো সেই canvas-এর ভেতরে actual plot area। plt.subplots() দিয়ে figure ও axes একসাথে তৈরি করা best practice। ML-এ training curves, confusion matrix, feature importance — সব কিছু এই setup দিয়ে শুরু।",
          examples: [
            {
              title: "Example 1 — Simple Figure তৈরি ও Save",
              code: [
                `<span class="kw">import</span> matplotlib.pyplot <span class="kw">as</span> plt
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># Figure এবং Axes একসাথে তৈরি</span>
fig, ax = plt.<span class="fn">subplots</span>(figsize=(<span class="nm">8</span>, <span class="nm">5</span>))

x = np.<span class="fn">linspace</span>(<span class="nm">0</span>, <span class="nm">10</span>, <span class="nm">100</span>)
y = np.<span class="fn">sin</span>(x)

ax.<span class="fn">plot</span>(x, y, color=<span class="st">'steelblue'</span>, linewidth=<span class="nm">2</span>)
ax.<span class="fn">set_title</span>(<span class="st">'Basic Sine Wave'</span>, fontsize=<span class="nm">16</span>, fontweight=<span class="st">'bold'</span>)
ax.<span class="fn">set_xlabel</span>(<span class="st">'X Axis'</span>)
ax.<span class="fn">set_ylabel</span>(<span class="st">'Y Axis'</span>)

plt.<span class="fn">tight_layout</span>()
plt.<span class="fn">savefig</span>(<span class="st">'plot.png'</span>, dpi=<span class="nm">150</span>, bbox_inches=<span class="st">'tight'</span>)
plt.<span class="fn">show</span>()
<span class="fn">print</span>(<span class="st">"Figure size:"</span>, fig.get_size_inches())`,
              ],
              output: `Figure size: [8. 5.]
→ plot.png saved (800×500 pixels at 150dpi)`,
            },
            {
              title: "Example 2 — Dark Style ও Multiple Subplots",
              code: [
                `plt.style.<span class="fn">use</span>(<span class="st">'dark_background'</span>)

fig, axes = plt.<span class="fn">subplots</span>(<span class="nm">1</span>, <span class="nm">3</span>, figsize=(<span class="nm">15</span>, <span class="nm">4</span>))

titles = [<span class="st">'Training Loss'</span>, <span class="st">'Validation Loss'</span>, <span class="st">'Accuracy'</span>]
colors = [<span class="st">'#38bdf8'</span>, <span class="st">'#fb923c'</span>, <span class="st">'#34d399'</span>]

<span class="kw">for</span> i, (ax, title, color) <span class="kw">in</span> <span class="fn">enumerate</span>(<span class="fn">zip</span>(axes, titles, colors)):
    ax.<span class="fn">plot</span>(np.<span class="fn">random.rand</span>(<span class="nm">50</span>), color=color, lw=<span class="nm">2</span>)
    ax.<span class="fn">set_title</span>(title, color=color, fontweight=<span class="st">'bold'</span>)
    ax.<span class="fn">set_xlabel</span>(<span class="st">'Epoch'</span>)

fig.<span class="fn">suptitle</span>(<span class="st">'Model Training Dashboard'</span>, fontsize=<span class="nm">16</span>, y=<span class="nm">1.02</span>)
plt.<span class="fn">tight_layout</span>()
plt.<span class="fn">show</span>()
<span class="fn">print</span>(<span class="st">"Available styles:"</span>, plt.style.<span class="fn">available</span>[:<span class="nm">5</span>])`,
              ],
              output: `Available styles: ['Solarize_Light2', '_classic_test_patch', '_mpl-gallery',
 '_mpl-gallery-nogrid', 'bmh']`,
            },
          ],
          ml: "ML-এ প্রতিটি visualization এই setup দিয়ে শুরু। figsize=(10,6) standard size। savefig() দিয়ে report-এ include করার জন্য save। plt.style.use('seaborn') দিয়ে publication-ready plot।",
        },

        {
          num: 2,
          title: "Line Plot",
          subtitle: "Training/Validation curves — ML-এ সবচেয়ে বেশি ব্যবহৃত",
          mlBadge: "★ Most Used",
          methods: [
            "ax.plot()",
            "linestyle=",
            "marker=",
            "linewidth=",
            "alpha=",
            "label=",

                      type: ShadingType.CLEAR,
                    },
                    width: { size: 500, type: WidthType.DXA },
                    margins: { top: 60, bottom: 60, left: 100, right: 100 },
                    children: [
                      new Paragraph({
                        children: [
                          new TextRun({
                            text: String(t.num),
                            font: "Arial",
                            size: 16,
                            bold: true,
                            color: TEAL,
                          }),
                        ],
                      }),
                    ],
                  }),
                  new TableCell({
                    borders: bord,
                    shading: {
                      fill: i % 2 === 0 ? "FFFFFF" : "F0FDFA",
                      type: ShadingType.CLEAR,
                    },
                    width: { size: 2000, type: WidthType.DXA },
                    margins: { top: 60, bottom: 60, left: 100, right: 100 },
                    children: [
                      new Paragraph({
                        children: [
                          new TextRun({
                            text: t.title,
                            font: "Arial",
                            size: 16,
                            bold: true,
                            color: "111827",
                          }),
                        ],
                      }),
                    ],
                  }),
                  new TableCell({
                    borders: bord,
                    shading: {
                      fill: i % 2 === 0 ? "FFFFFF" : "F0FDFA",
                      type: ShadingType.CLEAR,
                    },
                    width: { size: 2400, type: WidthType.DXA },
                    margins: { top: 60, bottom: 60, left: 100, right: 100 },
                    children: [
                      new Paragraph({
                        children: [
                          new TextRun({
                            text: t.methods.slice(0, 2).join(", "),
                            font: "Courier New",
                            size: 15,
                            color: "0E7490",
                          }),
                        ],
                      }),
                    ],
                  }),
                  new TableCell({
                    borders: bord,
                    shading: {
                      fill: i % 2 === 0 ? "FFFFFF" : "F0FDFA",
                      type: ShadingType.CLEAR,
                    },
                    width: { size: 4460, type: WidthType.DXA },
                    margins: { top: 60, bottom: 60, left: 100, right: 100 },
                    children: [
                      new Paragraph({
                        children: [
                          new TextRun({
                            text: t.ml.substring(0, 120),
                            font: "Arial",
                            size: 15,
                            color: "374151",
                          }),
                        ],
                      }),
                    ],
                  }),
                ],
              }),
            );
          });

          children.push(
            new Table({
              width: { size: 9360, type: WidthType.DXA },
              columnWidths: [500, 2000, 2400, 4460],
              rows: sumRows,
            }),
          );

          const doc = new Document({
            styles: {
              default: { document: { run: { font: "Arial", size: 20 } } },
            },
            sections: [
              {
                properties: {
                  page: {
                    size: { width: 12240, height: 15840 },
                    margin: {
                      top: 1000,
                      right: 1000,
                      bottom: 1000,
                      left: 1000,
                    },
                  },
                },
                children,
              },
            ],
          });

          const blob = await Packer.toBlob(doc);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "matplotlib_notes_ml.docx";
          a.click();
          URL.revokeObjectURL(url);

          const toast = document.getElementById("toast");
          toast.textContent = "✅ matplotlib_notes_ml.docx saved!";
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 3500);
        } catch (e) {
          alert("Error: " + e.message);
          console.error(e);
        } finally {
          btn.innerHTML = "💾 Save as .docx";
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
